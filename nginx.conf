# ─── Rate-limit zones (http context via conf.d include) ──────────────────────
# zone_general : all API calls              — 30 req/s per IP
# zone_auth    : login / register / OTP     — 5 req/s  per IP
# zone_chatbot : chatbot (calls external AI)— 2 req/s  per IP
# zone_heavy   : analytics dashboard/export — 1 req/s  per IP
limit_req_zone $binary_remote_addr zone=zone_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=zone_auth:10m    rate=5r/s;
limit_req_zone $binary_remote_addr zone=zone_chatbot:10m rate=2r/s;
limit_req_zone $binary_remote_addr zone=zone_heavy:10m   rate=1r/s;

# ─── Concurrent-connection limit (anti-slowloris / connection flood) ─────────
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

server {
    listen 80;
    server_name _;

    server_tokens off;
    client_max_body_size 6m;

    # Max concurrent connections per IP (across all locations)
    limit_conn conn_per_ip 80;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Security headers ────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header X-Frame-Options         "SAMEORIGIN"                       always;
    add_header X-XSS-Protection        "1; mode=block"                    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;

    # ─── AUTH endpoints — strict throttle + tiny body ────────────────────────
    location /api/auth/ {
        client_max_body_size 50k;
        limit_req zone=zone_auth burst=15 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8080/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ─── Chatbot — very strict (each call hits external paid AI API) ─────────
    location /api/public/chatbot/ {
        client_max_body_size 10k;
        limit_req zone=zone_chatbot burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8080/api/public/chatbot/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ─── Admin analytics / export — heavy CPU+DB, 1 req/s per IP ────────────
    location ~ ^/api/admin/analytics {
        limit_req zone=zone_heavy burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ─── General API — 30 req/s burst 50 ────────────────────────────────────
    location /api/ {
        limit_req zone=zone_general burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ─── React SPA — fallback all routes to index.html ───────────────────────
    location / {
        limit_req zone=zone_general burst=50 nodelay;
        limit_req_status 429;
        try_files $uri $uri/ /index.html;
    }

    # ─── OAuth2 redirect page (React route, must be before /oauth2/ proxy) ───
    location = /oauth2/redirect {
        try_files $uri /index.html;
    }

    location /oauth2/ {
        proxy_pass http://backend:8080/oauth2/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /login/oauth2/ {
        proxy_pass http://backend:8080/login/oauth2/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ─── File uploads ─────────────────────────────────────────────────────────
    location ^~ /uploads/ {
        proxy_pass http://backend:8080/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location ^~ /Images/ {
        proxy_pass http://backend:8080/Images/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ─── Static assets — long-term cache ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
